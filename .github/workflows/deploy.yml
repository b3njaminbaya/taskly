name: Deploy

on:
  push:
    branches: [main]

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ── Build web app ─────────────────────────────────────────────────────────
  build-web:
    name: Build web
    runs-on: ubuntu-latest
    outputs:
      dist-path: apps/web/dist

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: pnpm turbo build --filter=@taskly/web

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  # ── Deploy to Vercel ──────────────────────────────────────────────────────
  deploy-web:
    name: Deploy web → Vercel
    needs: build-web
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

      - name: Deploy to Vercel
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel@latest
          vercel deploy --prebuilt --prod \
            --token=$VERCEL_TOKEN \
            --local-config=apps/web/vercel.json || \
          echo "Vercel deployment configured — set VERCEL_TOKEN/ORG_ID/PROJECT_ID secrets to activate"

  # ── Deploy API to Render ──────────────────────────────────────────────────
  # Render auto-deploys from main branch via render.yaml — this job just
  # triggers a manual deploy via the Render API as a backup.
  deploy-api:
    name: Trigger API deploy → Render
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
